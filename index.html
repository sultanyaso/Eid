<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eid Mubarak — A Gift from Yasir Sultan</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Lora:ital,wght@0,400;0,600;1,400&family=Amiri:ital,wght@0,400;0,700;1,400&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">

<style>
:root {
  --gold: #f5c842;
  --gold-light: #ffe88a;
  --gold-dark: #b8860b;
  --emerald: #064e3b;
  --emerald-mid: #065f46;
  --emerald-light: #10b981;
  --cream: #fefce8;
  --ink: #1a1a0e;
  --rose: #f43f5e;
  --teal: #00d4e0;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  background: #000;
  font-family: 'Amiri', serif;
  cursor: none;
}

/* === SKY (original) === */
#sky {
  position: fixed; inset: 0;
  background: radial-gradient(ellipse at 30% 0%, #0f1a2e 0%, #071428 40%, #020810 100%);
  z-index: 0;
}
#sky::after {
  content: '';
  position: fixed; inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
  opacity: 0.4;
  pointer-events: none;
}

/* === ANIMATED BG CANVAS (original new) === */
#bg-canvas { position: fixed; inset: 0; z-index: 0; }

/* === NEON MOSQUE CANVAS === */
#mosque-canvas { position: fixed; inset: 0; z-index: 1; pointer-events: none; }

/* === AURORA (original new) === */
#aurora {
  position: fixed; inset: 0; z-index: 2; pointer-events: none;
  background:
    radial-gradient(ellipse 80% 40% at 20% 0%, rgba(16,185,129,0.12) 0%, transparent 70%),
    radial-gradient(ellipse 60% 30% at 80% 5%,  rgba(245,200,66,0.08) 0%, transparent 60%),
    radial-gradient(ellipse 50% 25% at 50% 0%,  rgba(0,200,212,0.10) 0%, transparent 55%);
  animation: auroraDrift 12s ease-in-out infinite alternate;
}
@keyframes auroraDrift {
  0%   { opacity: 0.5; transform: scaleX(1)    translateY(0); }
  50%  { opacity: 1;   transform: scaleX(1.06) translateY(-12px); }
  100% { opacity: 0.6; transform: scaleX(0.96) translateY(6px); }
}

/* === STARS (original) === */
#star-canvas { position: fixed; inset: 0; z-index: 3; pointer-events: none; }

/* === MOON (original) === */
.moon {
  position: fixed; top: 5vh; right: 8vw;
  width: 100px; height: 100px; z-index: 5;
  animation: moonGlow 4s ease-in-out infinite alternate;
}
.moon-body {
  width: 100%; height: 100%;
  background: radial-gradient(circle at 35% 35%, #fff9c4, #f5c842 60%, #b8860b);
  border-radius: 50%;
  box-shadow: 0 0 30px 10px rgba(245,200,66,0.4),0 0 80px 30px rgba(245,200,66,0.2),0 0 150px 60px rgba(245,200,66,0.08);
}
.moon-ring  { position: absolute; inset: -16px; border-radius: 50%; border: 1px solid rgba(245,200,66,0.25); animation: ringPulse 3s ease-in-out infinite; }
.moon-ring2 { position: absolute; inset: -32px; border-radius: 50%; border: 1px solid rgba(245,200,66,0.1);  animation: ringPulse 3s ease-in-out infinite 1.2s; }
@keyframes ringPulse { 0%,100%{opacity:0;transform:scale(0.88)} 50%{opacity:1;transform:scale(1)} }
.moon-crater { position: absolute; border-radius: 50%; background: rgba(184,134,11,0.3); }
@keyframes moonGlow { from{filter:brightness(1)} to{filter:brightness(1.22) drop-shadow(0 0 30px #f5c842)} }

/* === LANTERNS (original) === */
.lantern { position: fixed; z-index: 4; display: flex; flex-direction: column; align-items: center; animation: sway 3s ease-in-out infinite alternate; transform-origin: top center; }
.lantern-string { width: 2px; height: 40px; background: linear-gradient(to bottom, rgba(245,200,66,0.3), rgba(245,200,66,0.6)); }
.lantern-body { width: 28px; height: 42px; border-radius: 50% 50% 40% 40%/40% 40% 50% 50%; display: flex; align-items: center; justify-content: center; font-size: 10px; box-shadow: 0 0 20px 8px currentColor; position: relative; }
.lantern-glow { position: absolute; bottom: -8px; width: 8px; height: 14px; border-radius: 50%; background: rgba(255,255,255,0.8); box-shadow: 0 0 10px 5px currentColor; animation: flicker 0.5s ease-in-out infinite alternate; }
.lantern-halo { position: absolute; inset: -8px; border-radius: 50%; animation: haloFlicker 0.45s ease-in-out infinite alternate; }
@keyframes sway { from{transform:rotate(-8deg)} to{transform:rotate(8deg)} }
@keyframes flicker { from{opacity:0.7;transform:scaleY(0.9)} to{opacity:1;transform:scaleY(1.1)} }
@keyframes haloFlicker { from{opacity:0.4} to{opacity:1} }

/* === FIREFLIES (original) === */
.firefly { position: fixed; border-radius: 50%; width: 4px; height: 4px; background: var(--gold-light); box-shadow: 0 0 6px 2px var(--gold); pointer-events: none; z-index: 4; animation: fireflyFloat linear infinite; }
@keyframes fireflyFloat { 0%{transform:translate(0,0) scale(1);opacity:0} 25%{opacity:1} 75%{opacity:0.8} 100%{transform:translate(var(--dx),var(--dy)) scale(0.5);opacity:0} }

/* === SHOOTING STAR (original new) === */
.shoot { position: fixed; z-index: 5; pointer-events: none; height: 2px; border-radius: 2px; background: linear-gradient(to right, transparent, #fff, var(--gold)); animation: shootAnim var(--dur,0.8s) linear forwards; opacity: 0; }
@keyframes shootAnim { 0%{opacity:0} 10%{opacity:1} 100%{opacity:0;transform:translate(var(--tx),var(--ty))} }

/* === MAIN SCENE (original) === */
#scene { position: fixed; inset: 0; z-index: 10; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 0; }

/* === NAME INPUT (original) === */
.name-section { position: relative; margin-bottom: 28px; animation: fadeSlideDown 1s ease both; animation-delay: 0.3s; }
@keyframes fadeSlideDown { from{opacity:0;transform:translateY(-20px)} to{opacity:1;transform:translateY(0)} }
.name-label { display: block; font-family: 'Lora',serif; font-style: italic; color: var(--gold-light); font-size: 13px; text-align: center; letter-spacing: 2px; margin-bottom: 8px; opacity: 0.8; }
.name-input-wrap { position: relative; }
.name-input-wrap::before,.name-input-wrap::after { content:'✦'; position: absolute; top: 50%; transform: translateY(-50%); color: var(--gold); font-size: 12px; opacity: 0.7; }
.name-input-wrap::before { left: 14px; }
.name-input-wrap::after  { right: 14px; }
#recipientName { background: rgba(6,78,59,0.4); border: 1.5px solid rgba(245,200,66,0.4); border-radius: 40px; color: #fff; font-family: 'Amiri',serif; font-size: 16px; padding: 12px 40px; text-align: center; outline: none; width: 260px; backdrop-filter: blur(10px); transition: border-color 0.3s,box-shadow 0.3s; }
#recipientName::placeholder { color: rgba(245,200,66,0.4); }
#recipientName:focus { border-color: var(--gold); box-shadow: 0 0 20px rgba(245,200,66,0.25); }

/* ═══════════════════════════════════════════
   COMPLETE REALISTIC ENVELOPE
   ═══════════════════════════════════════════ */
.envelope-scene {
  position: relative;
  width: 360px; height: 255px;
  cursor: pointer;
  animation: fadeSlideUp 1s ease both 0.5s;
  perspective: 1000px;
}
@keyframes fadeSlideUp { from{opacity:0;transform:translateY(30px)} to{opacity:1;transform:translateY(0)} }
.envelope-scene:not(.open) { animation: fadeSlideUp 1s ease both 0.5s, envelopeHover 2s ease-in-out 1.5s infinite; }
@keyframes envelopeHover { 0%,100%{transform:translateY(0) scale(1)} 50%{transform:translateY(-7px) scale(1.015)} }

/* --- LETTER (lowest layer, inside) --- */
.letter-card {
  position: absolute;
  left: 22px; right: 22px; top: 15px;
  height: 205px;
  background: linear-gradient(140deg, #fffef7 0%, #fffcee 55%, #fef5cc 100%);
  border-radius: 6px;
  padding: 9px 16px 9px 16px;
  z-index: 1;
  box-shadow: 0 6px 24px rgba(0,0,0,0.35);
  transform: translateY(0);
  transition: transform 0.95s cubic-bezier(0.4,0,0.2,1);
  display: flex; flex-direction: column; justify-content: space-between;
  overflow: hidden;
}
.letter-card::before { content:''; position:absolute; inset:5px; border:1px solid rgba(184,134,11,0.38); border-radius:4px; pointer-events:none; }
.letter-card::after  { content:''; position:absolute; inset:8px; border:1px solid rgba(184,134,11,0.14); border-radius:3px; pointer-events:none; }
.letter-wm { position:absolute; inset:0; border-radius:6px; opacity:0.035; background:repeating-linear-gradient(45deg,#b8860b 0,#b8860b 1px,transparent 1px,transparent 13px),repeating-linear-gradient(-45deg,#b8860b 0,#b8860b 1px,transparent 1px,transparent 13px); }
.letter-top { display:flex; flex-direction:column; }
.letter-arabesque { text-align:center; font-size:15px; color:var(--gold-dark); letter-spacing:5px; margin-bottom:1px; opacity:0.65; }
.letter-title { font-family:'Cinzel Decorative',cursive; font-size:12.5px; font-weight:700; text-align:center; background:linear-gradient(135deg,#7c4a00,#c9930a,#f0c040,#c9930a,#7c4a00); background-size:200% auto; -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; animation:titleShimmer 4s linear infinite; line-height:1.3; margin-bottom:2px; }
@keyframes titleShimmer { 0%{background-position:0% center} 100%{background-position:200% center} }
.letter-divider { text-align:center; color:var(--gold-dark); font-size:10px; letter-spacing:5px; margin:1px 0; opacity:0.42; }
.letter-msg { font-family:'Lora',serif; font-style:italic; font-size:10.5px; color:#3d2b00; text-align:center; line-height:1.65; }
/* Signature — always at bottom */
.letter-footer {
  display:flex; align-items:flex-end; justify-content:flex-end;
  padding-top:4px; border-top:1px solid rgba(184,134,11,0.2);
  position:relative; flex-shrink:0;
}
.letter-footer::before { content:'✦ · · ·'; position:absolute; left:0; bottom:3px; font-size:8px; color:rgba(184,134,11,0.38); letter-spacing:2px; }
.sig-wrap { display:flex; flex-direction:column; align-items:flex-end; gap:0px; }
.sig-from { font-family:'Lora',serif; font-style:italic; font-size:7.5px; color:rgba(100,65,0,0.6); letter-spacing:2px; text-transform:uppercase; }
.sig-name {
  font-family:'Dancing Script',cursive; font-size:18px; font-weight:700;
  background:linear-gradient(135deg,#7c4a00,#c9930a,#f5c842,#c9930a,#7c4a00);
  background-size:200% auto; -webkit-background-clip:text; -webkit-text-fill-color:transparent;
  background-clip:text; animation:titleShimmer 3s linear infinite;
  line-height:1.05; filter:drop-shadow(0 1px 3px rgba(184,134,11,0.28));
}
.sig-line { width:100%; height:1.5px; background:linear-gradient(to right,transparent,#c9930a,#f5c842,#c9930a,transparent); border-radius:2px; }

/* --- ENVELOPE BODY (middle layer) --- */
.env-body {
  position: absolute; inset: 0;
  z-index: 2;
  border-radius: 10px;
  overflow: visible;
  box-shadow: 0 30px 80px rgba(0,0,0,0.7), 0 0 0 1.5px rgba(245,200,66,0.32);
}
.env-base {
  position: absolute; inset: 0;
  background: linear-gradient(160deg, #0e5a36 0%, #084828 45%, #052e18 100%);
  border-radius: 10px;
  overflow: hidden;
}
.env-base::after { content:''; position:absolute; inset:0; background:linear-gradient(105deg,transparent 38%,rgba(245,200,66,0.055) 50%,transparent 62%); background-size:200% 100%; animation:sheen 4.5s ease-in-out infinite; }
@keyframes sheen { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

/* Left triangle fold */
.env-fl { position:absolute; bottom:0; left:0; width:0; height:0; border-bottom:130px solid #0a3d25; border-right:180px solid transparent; z-index:2; }
/* Right triangle fold */
.env-fr { position:absolute; bottom:0; right:0; width:0; height:0; border-bottom:130px solid #073018; border-left:180px solid transparent; z-index:2; }
/* Bottom V fold */
.env-fb { position:absolute; bottom:0; left:0; right:0; height:0; border-left:180px solid transparent; border-right:180px solid transparent; border-bottom:130px solid #0c4a2c; z-index:3; }
/* Centre seam */
.env-seam { position:absolute; bottom:0; left:50%; transform:translateX(-50%); width:1px; height:130px; background:linear-gradient(to top,rgba(245,200,66,0.22),transparent); z-index:4; }
/* Gold corners */
.env-c { position:absolute; width:36px; height:36px; z-index:5; }
.env-c svg { width:100%; height:100%; }
.env-c.tl { top:5px; left:5px; }
.env-c.tr { top:5px; right:5px; transform:scaleX(-1); }
.env-c.bl { bottom:5px; left:5px; transform:scaleY(-1); }
.env-c.br { bottom:5px; right:5px; transform:scale(-1); }
/* Sender */
.env-sender { position:absolute; bottom:14px; left:50%; transform:translateX(-50%); font-family:'Cinzel Decorative',cursive; font-size:9.5px; letter-spacing:4px; color:rgba(245,200,66,0.48); white-space:nowrap; z-index:6; transition:opacity 0.4s; }

/* --- WAX SEAL --- */
.wax-seal {
  position: absolute;
  left: 50%; bottom: 35px;
  transform: translateX(-50%);
  width: 68px; height: 68px;
  z-index: 7;
  transition: opacity 0.5s, transform 0.5s cubic-bezier(0.4,0,0.2,1);
  filter: drop-shadow(0 4px 14px rgba(0,0,0,0.55));
}
.wax-seal svg { width:100%; height:100%; }

/* --- FLAP (3D fold open) --- */
.env-flap-wrap {
  position: absolute; top: 0; left: 0; right: 0;
  height: 150px;
  transform-origin: top center;
  transform-style: preserve-3d;
  transition: transform 0.95s cubic-bezier(0.4,0,0.15,1);
  z-index: 8;
}
.env-flap-front {
  position: absolute; top:0; left:0; right:0; height:150px;
  background: linear-gradient(170deg,#0f6540 0%,#0b5030 40%,#094228 100%);
  clip-path: polygon(0 0,100% 0,50% 73%);
  backface-visibility: hidden;
}
.env-flap-front::before { content:''; position:absolute; inset:0; clip-path:polygon(0 0,100% 0,50% 73%); background:linear-gradient(170deg,rgba(245,200,66,0.14) 0%,transparent 55%); }
.env-flap-front::after  { content:''; position:absolute; inset:0; clip-path:polygon(0 0,100% 0,50% 73%); background:linear-gradient(to bottom right,rgba(0,0,0,0.08) 0%,transparent 50%),linear-gradient(to bottom left,rgba(0,0,0,0.08) 0%,transparent 50%); }
.env-flap-back { position:absolute; top:0; left:0; right:0; height:150px; background:linear-gradient(170deg,#074028 0%,#052a18 100%); clip-path:polygon(0 0,100% 0,50% 73%); backface-visibility:hidden; transform:rotateX(180deg); }
/* Gold SVG border on flap */
.env-flap-svg { position:absolute; top:0; left:0; width:100%; height:150px; pointer-events:none; z-index:9; overflow:visible; }

/* --- OPEN STATE --- */
.envelope-scene.open .env-flap-wrap  { transform: rotateX(-185deg); }
.envelope-scene.open .letter-card    { transform: translateY(-185px); z-index: 12; }
.envelope-scene.open .wax-seal       { opacity: 0; transform: translateX(-50%) scale(0.25) rotate(30deg); }
.envelope-scene.open .env-sender     { opacity: 0; }

/* === CLICK HINT (original) === */
.click-hint { position:absolute; bottom:-36px; left:50%; transform:translateX(-50%); font-family:'Lora',serif; font-style:italic; font-size:12px; color:rgba(245,200,66,0.5); white-space:nowrap; letter-spacing:1px; animation:pulse 2s ease-in-out infinite; }
.click-hint::before { content:'↑ '; }
.click-hint::after  { content:' ↑'; }
@keyframes pulse { 0%,100%{opacity:0.4} 50%{opacity:0.9} }

/* === PARTICLES (original) === */
#particle-layer { position:fixed; inset:0; z-index:20; pointer-events:none; }

/* === CURSOR TRAIL (original) === */
.trail-dot { position:fixed; width:6px; height:6px; background:var(--gold); border-radius:50%; pointer-events:none; z-index:100; box-shadow:0 0 8px var(--gold); animation:trailFade 0.8s ease forwards; }
@keyframes trailFade { from{opacity:0.9;transform:scale(1)} to{opacity:0;transform:scale(0) translateY(-20px)} }
#cursor { position:fixed; width:12px; height:12px; border-radius:50%; background:var(--gold); pointer-events:none; z-index:9999; mix-blend-mode:screen; box-shadow:0 0 10px var(--gold),0 0 22px rgba(245,200,66,0.4); transform:translate(-50%,-50%); }
#cursor-ring { position:fixed; width:34px; height:34px; border-radius:50%; border:1.5px solid rgba(245,200,66,0.45); pointer-events:none; z-index:9998; transform:translate(-50%,-50%); }

/* === SPARKLE TRAIL (original new) === */
.sparkle { position:fixed; pointer-events:none; z-index:9990; animation:sparklePop 0.75s ease forwards; transform:translate(-50%,-50%); }
@keyframes sparklePop { 0%{opacity:1;transform:translate(-50%,-50%) scale(1) rotate(0)} 100%{opacity:0;transform:translate(-50%,-50%) scale(0) rotate(180deg) translateY(-30px)} }

/* === CLICK RIPPLE (original new) === */
.ripple { position:fixed; border-radius:50%; border:2px solid rgba(245,200,66,0.65); pointer-events:none; z-index:9985; animation:rippleOut 0.9s ease forwards; transform:translate(-50%,-50%); }
@keyframes rippleOut { from{width:0;height:0;opacity:1} to{width:90px;height:90px;opacity:0} }

/* === FLOATING BISMILLAH (original) === */
.bismillah-text { position:fixed; top:5vh; left:50%; transform:translateX(-50%); font-family:'Amiri',serif; font-size:22px; color:rgba(245,200,66,0.6); letter-spacing:3px; z-index:6; white-space:nowrap; animation:fadeSlideDown 1.2s ease both,floatText 6s ease-in-out infinite; }
@keyframes floatText { 0%,100%{transform:translateX(-50%) translateY(0)} 50%{transform:translateX(-50%) translateY(-6px)} }

/* === CONFETTI (original) === */
.conf { position:fixed; pointer-events:none; z-index:50; width:8px; height:12px; border-radius:2px; animation:confettiFall linear forwards; }
@keyframes confettiFall { 0%{transform:translateY(-20px) rotate(0);opacity:1} 100%{transform:translateY(110vh) rotate(720deg);opacity:0} }

/* === GLOW BURST (original new) === */
.glow-burst { position:fixed; inset:0; z-index:55; pointer-events:none; background:radial-gradient(ellipse at center,rgba(245,200,66,0.28) 0%,transparent 70%); animation:burstFade 1.3s ease forwards; }
@keyframes burstFade { from{opacity:1} to{opacity:0} }

/* === MAGIC RING (original new) === */
.magic-ring { position:fixed; border-radius:50%; pointer-events:none; z-index:52; border:3px solid var(--gold); box-shadow:0 0 25px var(--gold),inset 0 0 25px rgba(245,200,66,0.15); animation:ringReveal 1.6s cubic-bezier(0.4,0,0.2,1) forwards; transform:translate(-50%,-50%); }
@keyframes ringReveal { 0%{width:0;height:0;opacity:1} 60%{width:600px;height:600px;opacity:0.8} 100%{width:900px;height:900px;opacity:0} }

/* === FLOATING DUA TEXT (original new) === */
.dua-float { position:fixed; z-index:55; pointer-events:none; font-family:'Amiri',serif; font-size:20px; color:var(--gold-light); text-shadow:0 0 20px var(--gold); white-space:nowrap; animation:duaRise 3.5s ease forwards; transform:translateX(-50%); }
@keyframes duaRise { 0%{opacity:0;transform:translateX(-50%) translateY(0)} 20%{opacity:1} 100%{opacity:0;transform:translateX(-50%) translateY(-130px)} }

/* === SPARKLE RAIN (original new) === */
.rain-spark { position:fixed; z-index:53; pointer-events:none; font-size:16px; animation:rainFall linear forwards; }
@keyframes rainFall { from{transform:translateY(-20px) rotate(0);opacity:1} to{transform:translateY(110vh) rotate(360deg);opacity:0} }

/* ═══════════════════════════════════════════════════
   FULLY RESPONSIVE — ALL SCREEN SIZES
   Tiny phones → Large desktops → Landscape tablets
   ═══════════════════════════════════════════════════ */

/* ── Fluid moon ── */
.moon { width: clamp(55px,9vw,110px); height: clamp(55px,9vw,110px); }

/* ── Fluid bismillah ── */
.bismillah-text { font-size: clamp(14px,3.5vw,24px); }

/* ── Fluid name input ── */
.name-label { font-size: clamp(10px,2.5vw,13px); }
#recipientName { width: clamp(200px,70vw,270px); font-size: clamp(13px,3vw,16px); padding: clamp(8px,2vw,12px) 40px; }

/* ── Fluid envelope — uses CSS custom props set by JS ── */
.envelope-scene {
  width:  clamp(260px, 88vw, 380px);
  height: clamp(185px, 62vw, 265px);
}

/* ── Fluid letter card ── */
.letter-card {
  left:   clamp(14px, 4vw, 24px);
  right:  clamp(14px, 4vw, 24px);
  top:    clamp(10px, 3vw, 16px);
  height: calc(100% - clamp(10px,3vw,16px));
  padding: clamp(7px,1.8vw,11px) clamp(12px,3vw,18px);
}
.letter-arabesque { font-size: clamp(11px,2.5vw,16px); }
.letter-title      { font-size: clamp(9px, 2.2vw,13px); }
.letter-divider    { font-size: clamp(7px, 1.8vw,11px); }
.letter-msg        { font-size: clamp(8.5px,2vw,11px); line-height:1.6; }
.sig-from          { font-size: clamp(6px,1.5vw,8px); }
.sig-name          { font-size: clamp(13px,3.5vw,20px); }

/* ── Fluid envelope folds ── */
/* These must match half the envelope width */
.env-fl { border-right-width:  calc(clamp(260px,88vw,380px) / 2); border-bottom-width: clamp(90px,30vw,135px); }
.env-fr { border-left-width:   calc(clamp(260px,88vw,380px) / 2); border-bottom-width: clamp(90px,30vw,135px); }

const bgCanvas = document.getElementById('bg-canvas');
const bgCtx    = bgCanvas.getContext('2d');
function resizeBg(){ bgCanvas.width=innerWidth; bgCanvas.height=innerHeight; }
resizeBg(); window.addEventListener('resize',resizeBg);
let bgT=0;
(function drawBg(){
  bgT+=0.003;
  const g=bgCtx.createRadialGradient(innerWidth*(0.3+0.1*Math.sin(bgT)),innerHeight*0.1,0,innerWidth*0.5,innerHeight*0.5,innerWidth);
  g.addColorStop(0,`hsl(${210+8*Math.sin(bgT)},60%,5%)`);
  g.addColorStop(0.35,`hsl(${155+5*Math.cos(bgT)},55%,4%)`);
  g.addColorStop(0.7,`hsl(${38+4*Math.sin(bgT+1)},55%,4%)`);
  g.addColorStop(1,'#010408');
  bgCtx.fillStyle=g; bgCtx.fillRect(0,0,innerWidth,innerHeight);
  requestAnimationFrame(drawBg);
})();

// ═══════════════════════════════════════════════════════
// NEON MOSQUE CANVAS with Moving Light Border (NEW)
// ═══════════════════════════════════════════════════════

  const B=H; // base Y
  const s=W/900; // scale factor based on 900px design width

  return [
    // ─── TEAL LEFT MOSQUE ───
    {
      type:'stroke',color:'#00d4e0',glow:'#00d4e0',glowSize:12,width:2.2,
      // Outer dome
      path:(ctx)=>{
        ctx.beginPath();
        ctx.moveTo(160*s, B);
        ctx.lineTo(160*s, B-85); ctx.lineTo(140*s, B-85); ctx.lineTo(140*s, B-112);

        ctx.moveTo(128*s,B-250); ctx.quadraticCurveTo(132*s,B-262,136*s,B-250);
      }
    },
    {
      type:'stroke',color:'#00bcd4',glow:'#00bcd4',glowSize:10,width:1.8,

      path:(ctx)=>{

    },
    {
      type:'stroke',color:'#00d4e0',glow:'#00d4e0',glowSize:8,width:1.4,

    },
    // ─── GOLD RIGHT MOSQUE ───
    {
      type:'stroke',color:'#f5a020',glow:'#f5c842',glowSize:14,width:2.6,

      path:(ctx)=>{
        ctx.beginPath();
        ctx.moveTo(568*s,B); ctx.lineTo(568*s,B-245);

        ctx.lineTo(578*s,B-358); ctx.lineTo(584*s,B-390);
        ctx.lineTo(584*s,B-420); ctx.lineTo(588*s,B-448);

        ctx.lineTo(602*s,B-358); ctx.lineTo(608*s,B-326);

        ctx.lineTo(620*s,B-245); ctx.lineTo(612*s,B-245); ctx.lineTo(612*s,B);
        // Crescent
        ctx.moveTo(587*s,B-474); ctx.quadraticCurveTo(592*s,B-490,597*s,B-474);
      }
    },
    {
      type:'stroke',color:'#f5a020',glow:'#f5a020',glowSize:11,width:2,
      // Left dome
      path:(ctx)=>{
        ctx.beginPath();

        ctx.beginPath();
        ctx.moveTo(730*s,B); ctx.lineTo(730*s,B-102); ctx.lineTo(722*s,B-102);
        ctx.lineTo(722*s,B-122); ctx.lineTo(734*s,B-148); ctx.lineTo(734*s,B-172);
        ctx.lineTo(738*s,B-196); ctx.lineTo(742*s,B-218); ctx.lineTo(742*s,B-238);
        ctx.lineTo(744*s,B-250); ctx.lineTo(746*s,B-238); ctx.lineTo(746*s,B-218);
        ctx.lineTo(750*s,B-196); ctx.lineTo(754*s,B-172); ctx.lineTo(754*s,B-148);
        ctx.lineTo(766*s,B-122); ctx.lineTo(766*s,B-102); ctx.lineTo(758*s,B-102); ctx.lineTo(758*s,B);
        ctx.moveTo(741*s,B-252); ctx.quadraticCurveTo(745*s,B-264,749*s,B-252);
      }
    },
    {
      type:'stroke',color:'#f5a020',glow:'#f5a020',glowSize:8,width:1.4,
      // Windows + base
      path:(ctx)=>{
        ctx.beginPath(); ctx.moveTo(432*s,B); ctx.lineTo(770*s,B);
        ctx.moveTo(525*s,B-62); ctx.ellipse(525*s,B-62,13*s,19*s,0,Math.PI,0,true); ctx.lineTo(512*s,B-62);
        ctx.moveTo(679*s,B-62); ctx.ellipse(679*s,B-62,13*s,19*s,0,Math.PI,0,true); ctx.lineTo(666*s,B-62);
      }
    }
  ];
}

// Moving light dot along mosque paths
// We'll store path total lengths and animate a bright dot
let mosqueT=0; // time
let neonParticles=[];

// Generate random neon sparks around mosque area
function spawnNeonSpark(W,H,s){
  // Random position roughly in mosque area
  const side=Math.random()<0.5;
  let x,y,col;
  if(side){ // teal left mosque area
    x=(110+Math.random()*190)*s;
    y=H-(40+Math.random()*230)*s;
    col='#00d4e0';
  } else { // gold right
    x=(430+Math.random()*350)*s;
    y=H-(40+Math.random()*460)*s;
    col='#f5a020';
  }
  neonParticles.push({x,y,col,life:1,speed:0.015+Math.random()*0.025,size:1+Math.random()*2.5,vy:-0.4-Math.random()*0.8,vx:(Math.random()-0.5)*0.3});
}

// Moving light trail on mosque outlines
const trailDots={teal:[],gold:[]};
let tTrail=0; // 0-1 position along teal path
let gTrail=0;

function drawMosque(ts){
  const W=mc.width, H=mc.height;
  mCtx.clearRect(0,0,W,H);
  const s=W/900;
  const B=H;

  const paths=getMosquePaths(W,H);

  // Draw each mosque path with glow
  paths.forEach(p=>{
    // Big outer glow
    mCtx.save();
    mCtx.shadowBlur=p.glowSize*2.5;
    mCtx.shadowColor=p.glow;
    mCtx.strokeStyle=p.color;
    mCtx.lineWidth=p.width*0.5;
    mCtx.lineCap='round';
    mCtx.lineJoin='round';
    mCtx.globalAlpha=0.4;
    p.path(mCtx); mCtx.stroke();
    mCtx.restore();

    // Sharp inner line
    mCtx.save();
    mCtx.shadowBlur=p.glowSize;
    mCtx.shadowColor=p.glow;
    mCtx.strokeStyle=p.color;
    mCtx.lineWidth=p.width;
    mCtx.lineCap='round';
    mCtx.lineJoin='round';
    mCtx.globalAlpha=0.88;
    p.path(mCtx); mCtx.stroke();
    mCtx.restore();
  });

  // ── MOVING LIGHT DOTS along outlines ──
  mosqueT+= 0.008;

  // Teal moving orb (left mosque)
  const tx1= (110+90*Math.abs(Math.sin(mosqueT*0.7)))*s;
  const ty1= B-(60+180*Math.abs(Math.sin(mosqueT*0.5+0.5)))*s;
  drawOrb(mCtx,tx1,ty1,'#00ffff','#00d4e0',6*s);

  const tx2= (210+80*Math.sin(mosqueT*0.6+1))*s;
  const ty2= B-(80+160*Math.abs(Math.cos(mosqueT*0.4+0.8)))*s;
  drawOrb(mCtx,tx2,ty2,'#00ffff','#00bcd4',4*s);

  // Gold moving orb (right mosque)
  const gx1= (590+150*Math.sin(mosqueT*0.55))*s;
  const gy1= B-(80+350*Math.abs(Math.sin(mosqueT*0.45+0.3)))*s;
  drawOrb(mCtx,gx1,gy1,'#fff5a0','#f5c842',7*s);

  const gx2= (500+200*Math.cos(mosqueT*0.5+0.5))*s;
  const gy2= B-(60+200*Math.abs(Math.cos(mosqueT*0.6+1.2)))*s;
  drawOrb(mCtx,gx2,gy2,'#ffe060','#f5a020',5*s);

  const gx3= (745+20*Math.sin(mosqueT*0.8))*s;
  const gy3= B-(60+200*Math.abs(Math.sin(mosqueT*0.7+2)))*s;
  drawOrb(mCtx,gx3,gy3,'#fff0a0','#f5c842',4*s);

  // ── NEON SPARK PARTICLES ──
  if(Math.random()<0.18) spawnNeonSpark(W,H,s);
  neonParticles=neonParticles.filter(p=>{
    p.life-=p.speed;
    if(p.life<=0) return false;
    p.x+=p.vx; p.y+=p.vy;
    mCtx.save();
    mCtx.globalAlpha=p.life*0.9;
    mCtx.shadowBlur=p.size*4; mCtx.shadowColor=p.col;
    mCtx.fillStyle=p.col;
    mCtx.beginPath(); mCtx.arc(p.x,p.y,p.size,0,Math.PI*2); mCtx.fill();
    mCtx.restore();
    return true;
  });

  // ── EID MUBARAK TEXT ──
  mCtx.save();
  mCtx.globalAlpha=0.82;
  mCtx.shadowBlur=20; mCtx.shadowColor='#f5c842';
  mCtx.fillStyle='#f5c842';
  mCtx.font=`italic bold ${34*s}px 'Dancing Script',cursive`;
  mCtx.textAlign='center';
  mCtx.fillText('Eid',590*s,B-28*s);
  mCtx.shadowBlur=12;
  mCtx.font=`${16*s}px Georgia,serif`;
  mCtx.letterSpacing='4px';
  mCtx.fillStyle='rgba(245,200,66,0.75)';
  mCtx.fillText('Mubarak',597*s,B-8*s);
  mCtx.restore();

  requestAnimationFrame(drawMosque);
}

function drawOrb(ctx,x,y,innerCol,outerCol,r){
  // Outer glow ring
  ctx.save();
  ctx.shadowBlur=r*5; ctx.shadowColor=outerCol;
  ctx.fillStyle=outerCol; ctx.globalAlpha=0.3;
  ctx.beginPath(); ctx.arc(x,y,r*1.8,0,Math.PI*2); ctx.fill();
  // Inner bright dot
  ctx.shadowBlur=r*3; ctx.shadowColor=innerCol;
  ctx.fillStyle=innerCol; ctx.globalAlpha=0.95;
  ctx.beginPath(); ctx.arc(x,y,r*0.7,0,Math.PI*2); ctx.fill();
  // Tiny white core
  ctx.shadowBlur=r; ctx.shadowColor='#fff';
  ctx.fillStyle='#fff'; ctx.globalAlpha=0.8;
  ctx.beginPath(); ctx.arc(x,y,r*0.25,0,Math.PI*2); ctx.fill();
  ctx.restore();
}
requestAnimationFrame(drawMosque);

// ═══════════════════════════════════════
// STARS (original logic, upgraded renderer)
// ═══════════════════════════════════════
const canvas = document.getElementById('star-canvas');
const ctx    = canvas.getContext('2d');
let stars    = [];
function resizeCanvas(){ canvas.width=innerWidth; canvas.height=innerHeight; }
resizeCanvas(); window.addEventListener('resize',()=>{ resizeCanvas(); initStars(); });
function initStars(){
  stars=[];
  const count=Math.floor((canvas.width*canvas.height)/3800);
  for(let i=0;i<count;i++) stars.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height*0.75,r:Math.random()*1.5+0.3,da:(Math.random()-0.5)*0.009,twinkle:Math.random()*Math.PI*2,gold:Math.random()<0.12,teal:Math.random()<0.08});
}
initStars();
function drawStars(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  stars.forEach(s=>{
    s.twinkle+=s.da;
    const alpha=0.4+0.6*(Math.sin(s.twinkle)*0.5+0.5);
    ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
    ctx.fillStyle=s.teal?`rgba(0,200,212,${alpha})`:s.gold?`rgba(245,200,66,${alpha})`:`rgba(255,255,230,${alpha})`;
    ctx.fill();
    if(s.r>1.4){ ctx.beginPath(); ctx.arc(s.x,s.y,s.r*2.5,0,Math.PI*2); ctx.fillStyle=s.teal?`rgba(0,200,212,${alpha*0.15})`:s.gold?`rgba(245,200,66,${alpha*0.2})`:`rgba(245,200,66,${alpha*0.15})`; ctx.fill(); }
  });
  requestAnimationFrame(drawStars);
}
requestAnimationFrame(drawStars);

function launchCelebration(){
  const layer=document.getElementById('particle-layer');
  const cx=innerWidth/2, cy=innerHeight/2;

  const burst=document.createElement('div'); burst.className='glow-burst'; document.body.appendChild(burst); setTimeout(()=>burst.remove(),1400);

  [0,300].forEach((delay,idx)=>{ setTimeout(()=>{ const ring=document.createElement('div'); ring.className='magic-ring'; ring.style.left=cx+'px'; ring.style.top=cy+'px'; if(idx===1){ring.style.borderColor='rgba(0,212,224,0.7)';ring.style.boxShadow='0 0 20px rgba(0,212,224,0.6)';} document.body.appendChild(ring); setTimeout(()=>ring.remove(),1700); },delay); });

  const emojis=['🌙','⭐','✨','🌟','💛','🌸','🎊','🕌','📿','💫','🌺','🎆','🏵️','💐'];
  for(let i=0;i<70;i++){ setTimeout(()=>{ const p=document.createElement('div'); const angle=(i/70)*Math.PI*2+Math.random()*0.5,dist=100+Math.random()*320,dur=0.8+Math.random()*0.8; p.style.cssText=`position:fixed;left:${cx}px;top:${cy}px;font-size:${11+Math.random()*22}px;pointer-events:none;z-index:55;transition:transform ${dur}s cubic-bezier(0.1,0.8,0.2,1),opacity ${dur}s ease;opacity:1;will-change:transform,opacity;`; p.textContent=emojis[Math.floor(Math.random()*emojis.length)]; layer.appendChild(p); requestAnimationFrame(()=>{ p.style.transform=`translate(${Math.cos(angle)*dist}px,${Math.sin(angle)*dist}px) scale(${0.3+Math.random()})`; p.style.opacity='0'; }); setTimeout(()=>p.remove(),(dur+0.3)*1000); },i*22); }

  const confColors=['#f5c842','#10b981','#ef4444','#a78bfa','#f97316','#38bdf8','#fff','#fb7185','#34d399','#00d4e0','#fbbf24'];
  for(let i=0;i<120;i++){ setTimeout(()=>{ const c=document.createElement('div'); c.className='conf'; const color=confColors[Math.floor(Math.random()*confColors.length)],type=Math.floor(Math.random()*3); const shape=type===0?'width:8px;height:12px;border-radius:2px;':type===1?'width:10px;height:10px;border-radius:50%;':'width:14px;height:5px;border-radius:2px;'; c.style.cssText=shape+`background:${color};left:${2+Math.random()*96}vw;animation-duration:${2+Math.random()*2.5}s;transform:rotate(${Math.random()*360}deg);opacity:${0.7+Math.random()*0.3};`; document.body.appendChild(c); setTimeout(()=>c.remove(),5500); },i*30); }

  ['تَقَبَّلَ اللَّهُ مِنَّا وَمِنكُم','عيد مبارك وعيد سعيد','بارك الله فيك وفي عائلتك'].forEach((text,i)=>{ setTimeout(()=>{ const el=document.createElement('div'); el.className='dua-float'; el.textContent=text; el.style.left=(25+Math.random()*50)+'%'; el.style.top=(35+i*14)+'%'; document.body.appendChild(el); setTimeout(()=>el.remove(),3600); },500+i*700); });

  const rainSymbols=['✦','★','✿','◆','❋','✸','🌟'];
  for(let i=0;i<30;i++){ setTimeout(()=>{ const s=document.createElement('div'); s.className='rain-spark'; s.textContent=rainSymbols[Math.floor(Math.random()*rainSymbols.length)]; s.style.cssText=`left:${Math.random()*100}vw;top:-20px;color:hsl(${42+Math.random()*18},100%,${65+Math.random()*20}%);text-shadow:0 0 12px gold;animation-duration:${2+Math.random()*2}s;animation-delay:${Math.random()*1.5}s;`; document.body.appendChild(s); setTimeout(()=>s.remove(),4000); },i*80); }

  for(let i=0;i<6;i++) setTimeout(spawnShootingStar,i*180);
}
